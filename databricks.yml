bundle:
  name: dp-core

artifacts:
  dp_lib:
    type: whl
    build: poetry build

include:
  - workflows/*.yml
  - workflows/*/*.yml

sync:
  include:
    - configs/

variables:
  profile:
    description: "The deployment profile (dev, int, local, prod)"
  config_path:
    description: "Path to configuration files"
  catalog:
    description: "Unity Catalog name"
  datahub_alert_slack_id:
    description: "The notification destination id for datahub alerts"

targets:
  local:
    mode: development
    default: true
    workspace:
      host: https://adb-7405612648424970.10.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/local-bundle/${bundle.name}
      file_path: ${workspace.root_path}/files
    permissions:
        - group_name: users
          level: CAN_VIEW
    variables:
      profile: local
      config_path: ${workspace.file_path}/configs
      catalog: eun_dev_906_dh_data_db
      datahub_alert_slack_id: e62912a4-3e1b-42a4-9eb7-f048ecbd7d93
  dev:
    mode: development
    workspace:
      host: https://adb-7405612648424970.10.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/dev-bundle/${bundle.name}
      file_path: ${workspace.root_path}/files
    permissions:
        - group_name: users
          level: CAN_VIEW
        - group_name: Databricks-AZ-906-DEV-APP-1-DBW-Datahub-DataEngineers
          level: CAN_MANAGE
        - group_name: eun-dev-906-dh-catalog-owners
          level: CAN_MANAGE
    variables:
      profile: dev
      config_path: ${workspace.file_path}/configs
      catalog: eun_dev_906_dh_data_db
      datahub_alert_slack_id: e62912a4-3e1b-42a4-9eb7-f048ecbd7d93
    run_as:
      service_principal_name: b92f32fc-057f-49d5-b346-90e7e1f6a91a
